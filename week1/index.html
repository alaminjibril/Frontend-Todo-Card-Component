<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Card Component</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <main class="container">
    <article class="todo-card" data-testid="test-todo-card">
      <!-- Header section -->
      <header class="todo-card__header">
        <div class="todo-card__checkbox-wrapper">
          <input type="checkbox" id="task-complete" class="todo-card__checkbox"
            data-testid="test-todo-complete-toggle" />
          <label for="task-complete" class="visually-hidden">Mark task as complete</label>
        </div>

        <div class="todo-card__title-priority">
          <h2 class="todo-card__title" data-testid="test-todo-title">Complete quarterly reports</h2>
          <span class="todo-priority todo-priority--high" data-testid="test-todo-priority" aria-label="High priority">
            <span class="priority-dot"></span>High
          </span>
        </div>
      </header>

      <!-- Description -->
      <p class="todo-card__description" data-testid="test-todo-description">
        Review and finalize Q1 financial reports. Include team feedback and update forecasts.
      </p>

      <!-- Meta information -->
      <div class="todo-card__meta">
        <div class="todo-card__due-date">
          <time class="todo-card__time" datetime="2026-03-01T18:00:00Z" data-testid="test-todo-due-date">
            Due March 1, 2026
          </time>
          <span class="todo-time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">
            Due in 19 days
          </span>
        </div>

        <div class="todo-card__status">
          <span class="status-badge status-badge--in-progress" data-testid="test-todo-status">
            In Progress
          </span>
        </div>
      </div>

      <!-- Tags -->
      <div class="todo-card__tags" data-testid="test-todo-tags">
        <span class="tag" data-testid="test-todo-tag-work">Work</span>
        <span class="tag" data-testid="test-todo-tag-urgent">Urgent</span>
        <span class="tag">Quarterly</span>
      </div>

      <!-- Actions -->
      <footer class="todo-card__actions">
        <button class="btn btn--secondary" data-testid="test-todo-edit-button">
          Edit
        </button>
        <button class="btn btn--danger" data-testid="test-todo-delete-button">
          Delete
        </button>
      </footer>
    </article>
  </main>
  <script src="script.js"></script>
</body>

</html>
